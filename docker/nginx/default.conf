# Кэш PHP-ответов: только для аккаунтов с прокси (PHP скачивает и буферизует)
fastcgi_cache_path /var/cache/nginx/media
    levels=1:2
    keys_zone=media_cache:10m
    max_size=2g
    inactive=7d
    use_temp_path=off;

# Кэш CDN-контента: для X-Accel-Redirect (Nginx стримит напрямую, без PHP)
proxy_cache_path /var/cache/nginx/cdn
    levels=1:2
    keys_zone=cdn_cache:10m
    max_size=2g
    inactive=7d
    use_temp_path=off;

# Instagram CDN URLs содержат подписанные параметры (oh=, oe=), которые меняются
# при каждом API-запросе. ig_cache_key — стабильный хэш контента, используем его.
# Параметр передаётся внутри url=..., поэтому = закодирован как %3D, & как %26.
map $args $media_cache_key {
    ~*ig_cache_key(?:%3D|=)([^&]+?)(?:%26|$) $1;
    default $request_uri; # fallback: аватарки и прочее без ig_cache_key
}

server {
    listen 8000;
    server_name _;

    root /var/www/html/public;
    index index.php;

    client_max_body_size 64m;

    # Docker внутренний DNS — резолвинг laravel:9000 при запросе, не при старте Nginx
    # Без этого Nginx падает если laravel-контейнер ещё не поднялся
    resolver 127.0.0.11 valid=10s;
    set $laravel_upstream laravel:9000;

    # Внутренний CDN-прокси: вызывается через X-Accel-Redirect из PHP
    # Стримит байты с Instagram CDN напрямую — прогрессивный JPEG, без буферизации PHP
    location /internal/cdn-proxy/ {
        internal;
        # 127.0.0.11 — Docker внутренний DNS, форвардит внешние запросы к хосту
        # 1.1.1.1/8.8.8.8 недоступны напрямую внутри Docker-сети
        resolver 127.0.0.11 valid=10s;
        resolver_timeout 10s;

        # URL передаётся PHP через заголовок X-CDN-URL (не через query-param):
        # $arg_url не декодируется Nginx — proxy_pass получил бы "https%3A%2F%2F..." → 500
        set $upstream_url $upstream_http_x_cdn_url;
        proxy_pass $upstream_url;

        proxy_ssl_server_name on;       # SNI для HTTPS CDN
        proxy_set_header Host $proxy_host;
        proxy_set_header Authorization "";  # не передавать заголовки клиента в CDN
        proxy_set_header Cookie "";

        # ck = ig_cache_key или host+path, переданный PHP как стабильный ключ кэша
        proxy_cache cdn_cache;
        proxy_cache_key $arg_ck;
        proxy_cache_valid 200 7d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating;
        proxy_cache_lock on;            # при MISS только 1 запрос уходит в CDN, остальные ждут
        proxy_cache_lock_timeout 10s;
        proxy_ignore_headers Cache-Control Set-Cookie Expires;
        proxy_hide_header Set-Cookie;

        add_header X-Cache-Status $upstream_cache_status always;
    }

    # Медиа и аватарки: PHP валидирует запрос и либо отдаёт X-Accel-Redirect (без прокси),
    # либо сам скачивает через прокси аккаунта (с буферизацией)
    location ~ ^/api/proxy/(media|avatar) {
        fastcgi_pass $laravel_upstream;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        include fastcgi_params;
        fastcgi_read_timeout 120s;
        fastcgi_buffer_size 32k;
        fastcgi_buffers 16 32k;

        # Кэшируем только ответы с контентом (аккаунт с прокси, PHP буферизует)
        # Если PHP вернул X-Accel-Redirect — не кэшируем, контент хранится в cdn_cache
        fastcgi_cache media_cache;
        fastcgi_cache_key $media_cache_key;
        fastcgi_cache_valid 200 7d;
        fastcgi_cache_valid 404 1m;
        fastcgi_cache_use_stale error timeout updating;
        fastcgi_cache_lock on;
        fastcgi_cache_lock_timeout 10s;
        fastcgi_ignore_headers Cache-Control Set-Cookie X-Accel-Expires Expires;
        fastcgi_hide_header Set-Cookie;

        # X-Accel-Redirect ответы не пишем в fastcgi_cache — контент хранится в cdn_cache
        # (fastcgi_cache_bypass здесь не нужен: $upstream_http_* недоступен до ответа PHP)
        fastcgi_no_cache $upstream_http_x_accel_redirect;

        add_header X-Cache-Status $upstream_cache_status always;
    }

    # Все остальные запросы — без кэша
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ \.php$ {
        fastcgi_pass $laravel_upstream;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120s;
        fastcgi_buffer_size 32k;
        fastcgi_buffers 16 32k;
    }
}
