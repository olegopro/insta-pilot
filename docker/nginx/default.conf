server {
    listen 8000;
    server_name _;

    root /var/www/html/public;
    index index.php;

    client_max_body_size 64m;

    # Docker внутренний DNS — резолвинг laravel:9000 при запросе, не при старте Nginx
    # Без этого Nginx падает если laravel-контейнер ещё не поднялся
    resolver 127.0.0.11 valid=10s;
    set $laravel_upstream laravel:9000;
    # Отдельный PHP-FPM пул для медиа-прокси — не блокирует основной API при загрузке ленты
    set $laravel_media_upstream laravel:9001;

    # Прокси изображений: отдельный пул [media] (:9001) — загрузка ленты не блокирует API
    location ~ ^/api/proxy/image {
        fastcgi_pass $laravel_media_upstream;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        include fastcgi_params;
        fastcgi_read_timeout 30s;
        fastcgi_buffer_size 32k;
        fastcgi_buffers 16 32k;
    }

    # Все остальные запросы — без кэша
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ \.php$ {
        fastcgi_pass $laravel_upstream;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120s;
        fastcgi_buffer_size 32k;
        fastcgi_buffers 16 32k;
    }
}
