; Основной пул — API, очереди, WebSocket и прочие запросы (кроме медиа-прокси)
[www]
user = www-data
group = www-data

; PHP-FPM слушает на всех интерфейсах :9000 — Nginx обращается по имени сервиса laravel:9000
listen = 0.0.0.0:9000

; dynamic: воркеры запускаются по мере нагрузки, освобождаются при простое
pm = dynamic

; Жёсткий потолок одновременных запросов; каждый воркер — один синхронный PHP-процесс
pm.max_children = 20

; Воркеры при старте контейнера (до первых запросов)
pm.start_servers = 5

; Минимум простаивающих воркеров — держим тёплый пул, чтобы не было задержки при всплеске
pm.min_spare_servers = 3

; Максимум простаивающих воркеров — лишние убиваются после спада нагрузки
pm.max_spare_servers = 10

; После 500 обработанных запросов воркер перезапускается — защита от утечек памяти
pm.max_requests = 500

; Принудительно убиваем запрос через 120 с (совпадает с fastcgi_read_timeout Nginx)
request_terminate_timeout = 120

; Передаём все переменные окружения из Docker в PHP — нужно для .env Laravel
clear_env = no

; Пул для медиа-прокси (/api/proxy/media, /api/proxy/avatar)
; Изолирован от основного пула — массовая загрузка лент не блокирует API
[media]
user = www-data
group = www-data

; Отдельный порт — Nginx направляет медиа-запросы сюда
listen = 0.0.0.0:9001

; static: воркеры всегда готовы, нет задержки на старт при всплеске (лента = 20-30 запросов сразу)
pm = static
pm.max_children = 30

; После 1000 запросов перезапускаем — медиа-запросы лёгкие, без утечек, но порог выше
pm.max_requests = 1000

; Медиа-прокси — быстрая операция (DB lookup + заголовок), долгий запрос = ошибка
request_terminate_timeout = 30

clear_env = no
