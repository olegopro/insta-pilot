services:
  vue:
    build:
      context: ./frontend-vue
      dockerfile: ../docker/vue/Dockerfile
    ports:
      - '9000:9000'
    volumes:
      - ./frontend-vue:/app
      - /app/node_modules
    depends_on:
      - nginx
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    ports:
      - '8000:8000'
    volumes:
      - ./backend-laravel:/var/www/html
    depends_on:
      - laravel
    restart: unless-stopped

  laravel:
    build:
      context: .
      dockerfile: docker/laravel/Dockerfile
    volumes:
      - ./backend-laravel:/var/www/html
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      INSTAGRAM_PYTHON_URL: http://python:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  python:
    build:
      context: ./python-service
      dockerfile: ../docker/python/Dockerfile
    ports:
      - '8001:8001'
    volumes:
      - ./python-service:/app
    # --workers 1: asyncio.Lock живёт в памяти одного процесса; несколько воркеров
    # не делят Lock между собой — один аккаунт мог бы работать параллельно в разных воркерах
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --workers 1

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - 5432:5432
    volumes:
      - ./docker/postgres/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 5

  reverb:
    build:
      context: .
      dockerfile: docker/laravel/Dockerfile
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    volumes:
      - ./backend-laravel:/var/www/html
    env_file:
      - ./backend-laravel/.env
    depends_on:
      laravel:
        condition: service_started
      redis:
        condition: service_healthy

  queue-worker:
    build:
      context: .
      dockerfile: docker/laravel/Dockerfile
    command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=90
    volumes:
      - ./backend-laravel:/var/www/html
    env_file:
      - ./backend-laravel/.env
    depends_on:
      laravel:
        condition: service_started
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - 6379:6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

